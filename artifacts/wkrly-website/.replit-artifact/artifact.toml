kind = "web"
previewPath = "/"
title = "WKRLY Group"
version = "1.0.0"
id = "artifacts/wkrly-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19665

[services.development]
run = "pnpm --filter @workspace/wkrly-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/wkrly-website", "run", "build" ]
publicDir = "artifacts/wkrly-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19665"
BASE_PATH = "/"
